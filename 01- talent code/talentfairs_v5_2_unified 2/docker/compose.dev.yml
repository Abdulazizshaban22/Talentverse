# docker/compose.dev.yml
version: "3.9"
services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: talent
      POSTGRES_USER: talent
      POSTGRES_PASSWORD: talent
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
  adminer:
    image: adminer:4
    restart: unless-stopped
    ports: ["8080:8080"]
    environment: { ADMINER_DEFAULT_SERVER: db }
  # Optional: Keycloak (dev)
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev
    environment:
      KC_DB: dev-file
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports: ["8081:8080"]
    volumes: ["./realm:/opt/keycloak/data/import"]
volumes:
  pgdata:
