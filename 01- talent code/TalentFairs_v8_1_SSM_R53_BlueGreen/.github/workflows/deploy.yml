
name: Deploy v8.1
on:
  workflow_dispatch: {}
  push:
    branches: [ main ]
    paths: [ 'services/**', 'infra/terraform/**', '.github/workflows/deploy.yml' ]

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Build & Push Blue/Green images
        run: ./scripts/build_and_push_ecr.sh
  terraform-apply:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform Apply
        working-directory: infra/terraform/app
        env:
          TF_VAR_project: ${{ vars.PROJECT }}
          TF_VAR_region:  ${{ vars.AWS_REGION }}
          TF_VAR_domain:  ${{ vars.DOMAIN }}
          TF_VAR_hosted_zone_id: ${{ vars.HOSTED_ZONE_ID }}
          TF_VAR_auto_acm: "true"
          TF_VAR_api_image_blue:  ${{ vars.API_IMAGE_BLUE }}
          TF_VAR_api_image_green: ${{ vars.API_IMAGE_GREEN }}
          TF_VAR_web_image_blue:  ${{ vars.WEB_IMAGE_BLUE }}
          TF_VAR_web_image_green: ${{ vars.WEB_IMAGE_GREEN }}
          TF_VAR_alert_email: ${{ vars.ALERT_EMAIL }}
        run: |
          terraform init
          terraform apply -auto-approve
