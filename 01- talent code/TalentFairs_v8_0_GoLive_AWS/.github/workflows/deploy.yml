
name: Deploy v8.0
on:
  workflow_dispatch: {}
  push:
    branches: [ main ]
    paths: [ 'services/**', 'infra/terraform/**', '.github/workflows/deploy.yml' ]

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Build & Push API
        run: |
          ./scripts/build_and_push_ecr.sh
  terraform-apply:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform Apply
        working-directory: infra/terraform/app
        env:
          TF_VAR_api_image: ${{ vars.API_IMAGE }}
          TF_VAR_web_image: ${{ vars.WEB_IMAGE }}
          TF_VAR_domain:    ${{ vars.DOMAIN }}
          TF_VAR_alb_cert_arn: ${{ secrets.ALB_CERT_ARN }}
          TF_VAR_cf_cert_arn:  ${{ secrets.CF_CERT_ARN }}
        run: |
          terraform init
          terraform apply -auto-approve
