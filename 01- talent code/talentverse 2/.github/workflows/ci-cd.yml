
name: ci-cd
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}
permissions:
  id-token: write   # for OIDC
  contents: read

env:
  REGISTRY: ${{ vars.ECR_REGISTRY }}
  REPO: ${{ github.repository }}
  AWS_REGION: me-south-1

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: ./services/api-gateway
          push: true
          tags: ${{ env.REGISTRY }}/talentverse/api-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan api-gateway
        uses: aquasecurity/trivy-action@0.21.0
        with:
          image-ref: ${{ env.REGISTRY }}/talentverse/api-gateway:latest
          format: 'table'
          severity: 'CRITICAL,HIGH'

      - name: Build & Push ai-talentmatch
        uses: docker/build-push-action@v5
        with:
          context: ./services/ai-talentmatch
          push: true
          tags: ${{ env.REGISTRY }}/talentverse/ai-talentmatch:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan ai-talentmatch
        uses: aquasecurity/trivy-action@0.21.0
        with:
          image-ref: ${{ env.REGISTRY }}/talentverse/ai-talentmatch:latest
          format: 'table'
          severity: 'CRITICAL,HIGH'

  deploy:
    runs-on: ubuntu-latest
    needs: build-scan-push
    steps:
      - uses: actions/checkout@v4
      - name: Apply ArgoCD App-of-Apps
        run: |
          kubectl apply -n argocd -f infra/k8s/helm/app-of-apps/argocd-apps.yaml || true
