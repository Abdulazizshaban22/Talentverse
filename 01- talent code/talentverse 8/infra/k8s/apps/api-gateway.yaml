
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: api-gateway
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: ghcr.io/talentverse/api-gateway:latest
    argocd-image-updater.argoproj.io/write-back-method: argocd
    argocd-image-updater.argoproj.io/update-strategy: latest
spec:
  project: default
  source:
    repoURL: https://git.example/talentverse.git
    targetRevision: HEAD
    path: infra/k8s/helm/charts/api-gateway
  destination:
    server: https://kubernetes.default.svc
    namespace: talentverse
  syncPolicy:
    automated: { prune: true, selfHeal: true }
