
apiVersion: apps/v1
kind: Deployment
metadata: { name: ai-careerpath }
spec:
  replicas: 2
  selector: { matchLabels: { app: ai-careerpath } }
  template:
    metadata: { labels: { app: ai-careerpath } }
    spec:
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports: [{{containerPort: 8012}}]
---
apiVersion: v1
kind: Service
metadata: { name: ai-careerpath }
spec:
  selector: { app: ai-careerpath }
  ports:
    - port: 80
      targetPort: 8012
