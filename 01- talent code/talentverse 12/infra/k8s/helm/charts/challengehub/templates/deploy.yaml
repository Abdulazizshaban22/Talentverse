
apiVersion: apps/v1
kind: Deployment
metadata: { name: challengehub }
spec:
  replicas: 2
  selector: { matchLabels: { app: challengehub } }
  template:
    metadata: { labels: { app: challengehub } }
    spec:
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports: [{{containerPort: 8020}}]
---
apiVersion: v1
kind: Service
metadata: { name: challengehub }
spec:
  selector: { app: challengehub }
  ports:
    - port: 80
      targetPort: 8020
