
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-fastapi-dashboard
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  fastapi-dashboard.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "type": "dashboard",
            "name": "Annotations & Alerts",
            "hide": true
          }
        ]
      },
      "title": "FastAPI - Requests/Latency (OTel/Prom)",
      "timezone": "browser",
      "panels": [
        {
          "type": "timeseries",
          "title": "Requests per second",
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count[1m]))"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "P95 Latency (s)",
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket[5m])) by (le))"
            }
          ]
        }
      ],
      "schemaVersion": 38,
      "version": 1,
      "refresh": "10s"
    }