
apiVersion: 1
datasources:
  - name: CloudWatch
    type: cloudwatch
    access: proxy
    jsonData:
      authType: default
      defaultRegion: ${AWS_REGION}
      timeField: @timestamp
  - name: OpenSearch
    type: grafana-opensearch-datasource
    access: proxy
    jsonData:
      database: "[logs-*]"
      flavor: "opensearch"
      timeField: "@timestamp"
      version: "2.11.0"
